buildscript {
    ext.kotlin_version = '1.9.10'
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:7.3.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

// الحل السحري: نعرّف مسار Flutter SDK لـ Gradle
def flutterRoot = System.getenv('FLUTTER_ROOT')
if (flutterRoot == null) {
    def localProperties = new Properties()
    def localPropertiesFile = rootProject.file('local.properties')
    if (localPropertiesFile.exists()) {
        localPropertiesFile.withReader('UTF-8') { reader ->
            localProperties.load(reader)
        }
    }
    flutterRoot = localProperties.getProperty('flutter.sdk')
}

if (flutterRoot != null) {
    // نضيف مشروع المكوّن الإضافي لـ Gradle
    includeBuild("$flutterRoot/packages/flutter_tools/gradle")
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
