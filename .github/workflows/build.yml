name: Build APK (Final Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter 3.13.9
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.9'
          channel: 'stable'

      - name: Fix pubspec.yaml - add meta override
        run: |
          if grep -q "^dependency_overrides:" pubspec.yaml; then
            if ! grep -q "meta:" pubspec.yaml; then
              sed -i '/^dependency_overrides:/a\  meta: 1.13.0' pubspec.yaml
              echo "✅ Added meta to existing dependency_overrides"
            else
              echo "✅ meta override already exists"
            fi
          else
            cat >> pubspec.yaml << 'EOF'

          dependency_overrides:
            meta: 1.13.0
          EOF
            echo "✅ Added new dependency_overrides block"
          fi
          
          echo "═══ Updated pubspec.yaml ═══"
          cat pubspec.yaml

      - name: Clean pub cache and lock
        run: |
          echo "🗑️  Removing pubspec.lock..."
          rm -f pubspec.lock
          echo "🗑️  Removing cached meta versions..."
          rm -rf ~/.pub-cache/hosted/pub.dev/meta-*
          echo "✅ Cache cleaned"

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Verify meta version
        run: |
          echo "═══ meta in pubspec.lock ═══"
          if [ -f pubspec.lock ]; then
            grep -A 4 "^  meta:" pubspec.lock || echo "meta not found"
          else
            echo "No pubspec.lock yet"
          fi

      - name: Build APK
        id: build
        run: |
          set +e
          flutter build apk --release --target-platform=android-arm --verbose 2>&1 | tee /tmp/build.log | tail -80
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "BUILD_EXIT=$BUILD_EXIT" >> $GITHUB_ENV
          exit $BUILD_EXIT

      - name: Show errors if failed
        if: failure()
        run: |
          echo "═══════════════════════════════════════"
          echo "❌ BUILD FAILED"
          echo "═══════════════════════════════════════"
          tail -100 /tmp/build.log
          echo ""
          echo "═══ Errors ═══"
          grep -i -E "error:|exception|FAILURE|What went wrong" /tmp/build.log | head -30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          if-no-files-found: ignore

      - name: Verify APK
        if: success()
        run: |
          APK="build/app/outputs/flutter-apk/app-release.apk"
          if [ ! -f "$APK" ]; then
            echo "❌ APK not found!"
            exit 1
          fi
          echo "✅ APK generated:"
          ls -lh "$APK"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-a11-armv7
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: ignore
