name: Build APK (Direct Gradle)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.9'
          channel: 'stable'

      # ⬇️⬇️⬇️ الخطوة السحرية: تثبيت Gradle على النظام مباشرة ⬇️⬇️⬇️
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.6'
      # ⬆️⬆️⬆️ هذه الخطوة تتجاوز الـ Wrapper تماماً ⬆️⬆️⬆️

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build APK using system Gradle (NOT wrapper)
        run: |
          # نذهب إلى مجلد android ونستخدم الأمر gradle مباشرة (بدون ./gradlew)
          cd android
          gradle assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
