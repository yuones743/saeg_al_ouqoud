name: Build Android APK (32-bit)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.9'
          channel: 'stable'
          cache: true

      - name: Ensure gradle-wrapper.jar exists
        run: |
          set -e
          WRAPPER_DIR="android/gradle/wrapper"
          WRAPPER_JAR="$WRAPPER_DIR/gradle-wrapper.jar"
          WRAPPER_PROPS="$WRAPPER_DIR/gradle-wrapper.properties"
          
          mkdir -p "$WRAPPER_DIR"
          
          if [ ! -s "$WRAPPER_JAR" ]; then
            echo "⬇️  gradle-wrapper.jar not found, downloading from official Gradle 7.6.0 source..."
            curl -fL --retry 3 --connect-timeout 30 \
              -o "$WRAPPER_JAR" \
              "https://raw.githubusercontent.com/gradle/gradle/v7.6.0/gradle/wrapper/gradle-wrapper.jar"
            echo "✅ Downloaded successfully"
          else
            echo "✅ gradle-wrapper.jar already present"
          fi
          
          chmod +x android/gradlew || true
          
          echo "--- Wrapper files ---"
          ls -la "$WRAPPER_DIR"
          echo "--- gradle-wrapper.properties ---"
          cat "$WRAPPER_PROPS"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Show Java & Flutter versions
        run: |
          java -version
          flutter --version

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build APK (armeabi-v7a only, for Samsung A11)
        run: flutter build apk --release --target-platform=android-arm

      - name: Verify APK was generated
        run: |
          ls -lh build/app/outputs/flutter-apk/ || true
          file build/app/outputs/flutter-apk/app-release.apk || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-armv7
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
