name: Build APK (Flutter 3.24.5 Final)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Verify environment
        run: |
          flutter --version
          java -version 2>&1

      # ════════════════════════════════════════════════════════════
      # 🛠️ Backup - تم إصلاحه بالكامل
      # ════════════════════════════════════════════════════════════
      - name: Backup user custom Android files
        run: |
          mkdir -p /tmp/backup
          
          if [ -d android ]; then
            cd android
            
            if [ -f app/src/main/AndroidManifest.xml ]; then
              cp app/src/main/AndroidManifest.xml /tmp/backup/
              echo "✅ AndroidManifest.xml"
            fi
            
            if [ -d app/src/main/res ]; then
              cp -r app/src/main/res /tmp/backup/
              echo "✅ res/"
            fi
            
            if [ -d app/src/main/kotlin ]; then
              cp -r app/src/main/kotlin /tmp/backup/
              echo "✅ kotlin/"
            fi
            
            if [ -d app/src/main/java ]; then
              cp -r app/src/main/java /tmp/backup/
              echo "✅ java/"
            fi
          else
            echo "ℹ️  No android/ folder to back up"
          fi
          
          echo ""
          echo "=== Backup summary ==="
          find /tmp/backup -type f 2>/dev/null | head -30
          
          # ✅ صريح: مفيش فشل حتى لو في ملف ناقص
          exit 0

      - name: Generate fresh Android template
        run: |
          PROJECT_NAME=$(grep "^name:" pubspec.yaml | awk '{print $2}' | tr -d '\r')
          [ -z "$PROJECT_NAME" ] && PROJECT_NAME="saeg_al_ouqoud"
          echo "📦 Project: $PROJECT_NAME"
          
          rm -rf "$HOME/template"
          cd "$HOME"
          flutter create \
            --org=com.example \
            --project-name="$PROJECT_NAME" \
            --platforms=android \
            --no-pub \
            template 2>&1 | tail -10
          
          echo "exit: $?"

      - name: Replace android/ with fresh template
        run: |
          cd "$GITHUB_WORKSPACE"
          
          rm -rf android
          cp -r "$HOME/template/android" ./android
          chmod +x android/gradlew
          
          cat > android/local.properties << EOF
          sdk.dir=$ANDROID_SDK_ROOT
          flutter.sdk=$FLUTTER_ROOT
          flutter.versionName=1.0.0
          flutter.versionCode=1
          flutter.buildMode=release
          EOF
          
          echo "✅ New android/ ready"
          ls -la android/gradle/wrapper/
          exit 0

      # ════════════════════════════════════════════════════════════
      # 🛠️ Restore - تم إصلاحه أيضاً
      # ════════════════════════════════════════════════════════════
      - name: Restore user customizations
        run: |
          for f in AndroidManifest.xml res kotlin java; do
            SRC="/tmp/backup/$f"
            DEST="android/app/src/main/$f"
            
            if [ ! -e "$SRC" ]; then
              continue
            fi
            
            if [ -d "$SRC" ]; then
              mkdir -p "$DEST"
              cp -rn "$SRC"/* "$DEST/" 2>/dev/null
              echo "✅ Restored folder: $f"
            else
              cp "$SRC" "$DEST"
              echo "✅ Restored file: $f"
            fi
          done
          
          echo ""
          echo "=== app/src/main/ contents ==="
          ls -la android/app/src/main/
          exit 0

      - name: Configure for Samsung A11
        run: |
          cat > android/gradle.properties << 'GRADLE_PROPS_EOF'
          org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          android.nonTransitiveRClass=true
          GRADLE_PROPS_EOF

          cat > android/app/build.gradle << 'BUILD_GRADLE_EOF'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader ->
                  localProperties.load(reader)
              }
          }

          def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
          def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

          android {
              namespace "com.example.saeg_al_ouqoud"
              compileSdk 34
              ndkVersion flutter.ndkVersion

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = '17'
              }

              sourceSets {
                  main.java.srcDirs += 'src/main/kotlin'
              }

              defaultConfig {
                  applicationId "com.example.saeg_al_ouqoud"
                  minSdk 21
                  targetSdk 34
                  versionCode flutterVersionCode.toInteger()
                  versionName flutterVersionName

                  ndk {
                      abiFilters 'armeabi-v7a'
                  }
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }

          flutter {
              source '../..'
          }

          dependencies {
              implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:$kotlin_version"
          }
          BUILD_GRADLE_EOF
          
          echo "✅ Configured for Samsung A11"
          exit 0

      - name: Clean lock & cache
        run: |
          rm -f pubspec.lock
          rm -rf ~/.pub-cache/hosted/pub.dev/meta-*
          flutter clean
          echo "✅ Cleaned"
          exit 0

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Verify package versions
        run: |
          echo "═══ meta in pubspec.lock ═══"
          grep -A 3 "^  meta:" pubspec.lock || echo "not found"
          echo ""
          echo "═══ Other packages ═══"
          grep -A 1 "^  pdf:\|^  printing:\|^  provider:\|^  shared_preferences:" pubspec.lock | head -20
          exit 0

      # ════════════════════════════════════════════════════════════
      # 🚀 البناء - السجل محفوظ بشكل صحيح
      # ════════════════════════════════════════════════════════════
      - name: 🚀 Build APK
        id: build
        run: |
          # ✅ redirection بدل pipe — ده كان بيكسر السجل
          flutter build apk --release --target-platform=android-arm --verbose > /tmp/build.log 2>&1
          BUILD_EXIT=$?
          echo "Build exit code: $BUILD_EXIT"
          
          if [ $BUILD_EXIT -ne 0 ]; then
            echo ""
            echo "═══════════════════════════════════════"
            echo "❌ BUILD FAILED — آخر 100 سطر"
            echo "═══════════════════════════════════════"
            tail -100 /tmp/build.log
            echo ""
            echo "═══ Errors ═══"
            grep -i -E "(error:|exception|FAILURE|caused by|specified language|> Could not|> Task .* FAILED)" /tmp/build.log | head -30
          fi
          exit $BUILD_EXIT

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          if-no-files-found: ignore

      - name: Verify APK
        if: success()
        run: |
          APK="build/app/outputs/flutter-apk/app-release.apk"
          [ ! -f "$APK" ] && echo "❌ No APK" && exit 1
          ls -lh "$APK"
          file "$APK"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-a11-armv7
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: ignore
