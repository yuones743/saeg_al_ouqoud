name: saeg_al_ouqoud
description: تطبيق صائغ العقود السوري - نظام قرارات قانونية أوفلاين
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.1.0 <4.0.0'
  flutter: '>=3.13.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  pdf: ^3.10.7
  printing: ^5.11.1
  share_plus: ^7.2.1
  intl: ^0.18.1
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/rules/
    - assets/templates/
    - assets/fonts/
  fonts:
    - family: TraditionalArabic
      fonts:
        - asset: assets/fonts/TraditionalArabic.ttf
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
    - family: NotoNaskhArabic
      fonts:
        - asset: assets/fonts/NotoNaskhArabic-Regular.ttf
        - asset: assets/fonts/NotoNaskhArabic-Bold.ttf
          weight: 700
    - family: Lateef
      fonts:
        - asset: assets/fonts/Lateef-Regular.ttf